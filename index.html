<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alex and Aubrey Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
--burn1:#4b0f0f;
--burn2:#7a1e0e;
--burn3:#b34700;
--burn4:#d38b2f;
--burn5:#e8dcae;
--glass:rgba(0,0,0,0.55);
}

*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Montserrat',sans-serif;
color:white;
background:linear-gradient(rgba(70,20,0,.85),rgba(0,0,0,.85)),
url('https://images.unsplash.com/photo-1501973801540-537f08ccae7b?q=80&w=1974&auto=format&fit=crop');
background-size:cover;
background-attachment:fixed;
overflow-x:hidden;
}

/* Intro Animation */
#intro{
position:fixed;
inset:0;
background:linear-gradient(45deg,var(--burn1),var(--burn3));
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:9999;
animation:fadeOut 2s ease 4s forwards;
}

#intro h1{
font-family:'Playfair Display',serif;
font-size:3rem;
letter-spacing:3px;
animation:fadeIn 3s ease;
}

@keyframes fadeOut{
to{opacity:0;visibility:hidden}
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(20px)}
to{opacity:1}
}

/* Main container */
.container{
max-width:900px;
margin:120px auto;
background:var(--glass);
backdrop-filter:blur(12px);
padding:50px;
border-radius:20px;
box-shadow:0 0 40px rgba(0,0,0,.6);
animation:fadeIn 2s ease;
}

header{
text-align:center;
margin-bottom:40px;
}

header h1{
font-family:'Playfair Display',serif;
font-size:3rem;
letter-spacing:4px;
}

header p{
margin-top:10px;
font-size:1.1rem;
opacity:.9;
}

/* Countdown */
.countdown{
display:flex;
justify-content:center;
gap:20px;
margin:30px 0;
flex-wrap:wrap;
}

.time-box{
background:rgba(255,255,255,.1);
padding:15px 25px;
border-radius:10px;
text-align:center;
min-width:80px;
}

.time-box span{
display:block;
font-size:1.8rem;
font-weight:600;
}

/* Clock */
#clock{
text-align:center;
margin-top:10px;
font-size:1rem;
opacity:.85;
}

/* RSVP */
form{
margin-top:30px;
display:flex;
flex-direction:column;
gap:20px;
}

input, select, button{
padding:12px;
border-radius:8px;
border:none;
font-size:1rem;
}

input, select{
background:#fff;
color:#000;
}

button{
background:linear-gradient(45deg,var(--burn3),var(--burn4));
color:white;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.05);
}

footer{
text-align:center;
margin-top:40px;
font-size:.9rem;
opacity:.8;
}

/* Falling Leaves */
.leaf{
position:fixed;
top:-10%;
width:20px;
height:20px;
background:radial-gradient(circle,var(--burn4),var(--burn3));
border-radius:50%;
opacity:.8;
animation:fall linear infinite;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(360deg);
}
}

/* Accessibility */
button:focus,input:focus,select:focus{
outline:3px solid var(--burn5);
}

/* Admin Panel */
#adminPanel{
display:none;
margin-top:40px;
background:rgba(255,255,255,.1);
padding:20px;
border-radius:12px;
}

@media(max-width:600px){
header h1{font-size:2rem}
}
</style>
</head>

<body>

<div id="intro">
<h1>ALEX AND AUBREY AS ONE</h1>
<p>September 19, 2026 • 10:00 AM</p>
</div>

<div class="container" role="main">

<header>
<h1>ALEX AND AUBREY AS ONE</h1>
<p>Home of Authentic Laing</p>
</header>

<div class="countdown" aria-label="Wedding Countdown">
<div class="time-box"><span id="days"></span>Days</div>
<div class="time-box"><span id="hours"></span>Hours</div>
<div class="time-box"><span id="minutes"></span>Minutes</div>
<div class="time-box"><span id="seconds"></span>Seconds</div>
</div>

<div id="clock" aria-live="polite"></div>

<form id="rsvpForm" aria-label="Wedding RSVP Form">
<input type="text" id="name" placeholder="Full Name" required aria-required="true">
<select id="response" required aria-required="true">
<option value="">Will you attend?</option>
<option value="Going">Going</option>
<option value="Not Going">Not Going</option>
</select>
<button type="submit">Submit RSVP</button>
</form>

<button onclick="showAdmin()">Admin View</button>

<div id="adminPanel">
<h3>RSVP Responses</h3>
<ul id="responses"></ul>
</div>

<footer>
Wedding Ceremony Starts at 10:00 AM
</footer>

</div>

<script>
// Countdown
const weddingDate = new Date("September 19, 2026 10:00:00").getTime();

setInterval(()=>{
const now = new Date().getTime();
const distance = weddingDate - now;

document.getElementById("days").innerText=Math.floor(distance/(1000*60*60*24));
document.getElementById("hours").innerText=Math.floor((distance%(1000*60*60*24))/(1000*60*60));
document.getElementById("minutes").innerText=Math.floor((distance%(1000*60*60))/(1000*60));
document.getElementById("seconds").innerText=Math.floor((distance%(1000*60))/1000);
},1000);

// Live Clock
setInterval(()=>{
document.getElementById("clock").innerText=new Date().toLocaleString();
},1000);

// RSVP Save Local
const form=document.getElementById("rsvpForm");
const responsesList=document.getElementById("responses");

form.addEventListener("submit",e=>{
e.preventDefault();
const name=document.getElementById("name").value;
const response=document.getElementById("response").value;
const entry=`${name} - ${response}`;
let data=JSON.parse(localStorage.getItem("rsvps"))||[];
data.push(entry);
localStorage.setItem("rsvps",JSON.stringify(data));
alert("Thank you for your response!");
form.reset();
});

// Admin
function showAdmin(){
const pass=prompt("Enter Admin Password:");
if(pass==="weddingadmin"){
document.getElementById("adminPanel").style.display="block";
let data=JSON.parse(localStorage.getItem("rsvps"))||[];
responsesList.innerHTML="";
data.forEach(r=>{
let li=document.createElement("li");
li.textContent=r;
responsesList.appendChild(li);
});
}else{
alert("Incorrect password");
}
}

// Leaves generator
for(let i=0;i<20;i++){
let leaf=document.createElement("div");
leaf.classList.add("leaf");
leaf.style.left=Math.random()*100+"vw";
leaf.style.animationDuration=(5+Math.random()*5)+"s";
leaf.style.opacity=Math.random();
document.body.appendChild(leaf);
}
</script>

</body>
</html>
